<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2b1d14">
    
    <title>Six-Shooters - 5-Letter Showdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rye&family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --dust: #1a1613;
            --gold: #d4af37;
            --paper: #e3d5b8;
            --correct: #538d4e;
            --present: #b59f3b;
            --absent: #3a3a3c;
            --sky-top: #ff9d6c;
            --sky-bottom: #bb4e31;
            --cactus: #2d4c1e;
            --poster-red: #b22222;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dust);
            color: var(--paper);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
            position: relative;
            margin: 0;
            padding-top: env(safe-area-inset-top);
        }

        .valley-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
        }

        .valley-bg svg {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
        }

        .content-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 0;
        }

        header {
            position: relative;
            z-index: 20;
            background: #2b1d14;
            overflow: hidden;
            border-bottom: 4px solid var(--gold);
            padding: 0.8rem 0;
            flex-shrink: 0;
            text-align: center;
        }

        .header-landscape {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0.5;
        }

        .header-content { position: relative; z-index: 10; }

        h1 {
            font-family: 'Rye', cursive;
            color: var(--gold);
            text-shadow: 3px 3px 0px #000;
            font-size: 1.8rem;
            margin: 0;
        }

        #main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
            z-index: 10;
            padding: 5px 0;
        }

        .session-info {
            display: flex;
            justify-content: space-between;
            width: 90vw;
            max-width: 330px;
            margin-bottom: 8px;
            font-family: 'Rye', cursive;
            color: var(--gold);
            font-size: 0.85rem;
            text-shadow: 1px 1px 2px #000;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 8px;
            width: 90vw;
            max-width: 330px; 
            margin: 0 auto;
        }

        .tile {
            aspect-ratio: 1 / 1;
            border: 2px solid #5d4a3e;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            user-select: none;
            backdrop-filter: blur(4px);
            line-height: 1;
        }

        .tile.populated { border-color: var(--gold); animation: pop 0.1s linear 1; }
        @keyframes pop { 50% { transform: scale(1.1); } }

        .tile.flip { animation: flip 0.6s ease forwards; }
        @keyframes flip {
            0% { transform: rotateX(0); }
            45% { transform: rotateX(90deg); }
            55% { transform: rotateX(90deg); }
            100% { transform: rotateX(0); }
        }

        .present { background-color: var(--present) !important; border-color: var(--present) !important; color: white; }
        .correct { background-color: var(--correct) !important; border-color: var(--correct) !important; color: white; }
        .absent { background-color: var(--absent) !important; border-color: var(--absent) !important; color: #888; }

        #keyboard-area {
            flex-shrink: 0;
            width: 100%;
            position: relative;
            z-index: 10;
            padding-bottom: calc(3.5rem + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #keyboard-container { width: 100%; max-width: 500px; padding: 4px; }

        .key {
            background-color: #3d2b1f;
            color: var(--paper);
            border-radius: 4px;
            cursor: pointer;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            height: 54px;
            margin: 2px;
            transition: all 0.1s;
            border-bottom: 3px solid #1a1613;
            text-transform: uppercase;
            font-size: 1.3rem;
        }

        .key:active { transform: translateY(2px); border-bottom-width: 1px; }
        .key.absent-key { visibility: hidden; pointer-events: none; opacity: 0; }
        .key.present-key { background-color: var(--present); color: white; }
        .key.correct-key { background-color: var(--correct); color: white; }
        .key.wide { flex: 1.8; font-size: 0.75rem; font-family: 'Rye', cursive; }

        .surrender-btn {
            margin-top: 15px;
            background: none;
            border: 1px solid #5d4a3e;
            color: #d4af37;
            font-family: 'Rye', cursive;
            font-size: 0.75rem;
            padding: 8px 20px;
            border-radius: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            opacity: 0.8;
        }

        #modal-overlay {
            position: fixed; inset: 0;
            background-color: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center;
            z-index: 2000; backdrop-filter: blur(6px);
        }

        .wanted-poster {
            background-color: #f4f1ea; border: 2px solid #d3cbb8;
            padding: 1.25rem; max-width: 320px; width: 88%;
            display: flex; flex-direction: column; align-items: center;
            text-align: center; border-radius: 2px; position: relative;
        }

        .wanted-header { font-family: 'Rye', cursive; color: var(--poster-red); font-size: 2.8rem; margin: 0; width: 100%; }
        .wanted-divider { height: 2px; background-color: var(--poster-red); width: 100%; margin: 0.15rem 0 0.4rem; }
        
        .outlaw-content {
            display: flex; flex-direction: column; align-items: center; width: 100%;
            border-top: 1px dashed var(--poster-red); border-bottom: 1px dashed var(--poster-red);
            padding: 0.75rem 0; margin: 0.5rem 0;
        }

        .wanted-display { font-family: 'Rye', cursive; font-size: 2.4rem; color: #1a1613; letter-spacing: 2px; text-align: center; width: 100%; text-transform: uppercase; }
        .bounty-claimed { font-family: 'Rye', cursive; font-size: 1.5rem; color: var(--correct); margin-top: 2px; }
        
        .bounty-total-final { 
            font-family: 'Rye', cursive; 
            font-size: 1.1rem; 
            color: #1a1613; 
            margin-top: 12px; 
            border-top: 1px solid rgba(0,0,0,0.15); 
            width: 90%; 
            padding-top: 10px; 
            letter-spacing: 0.5px;
        }

        .wanted-sub { font-weight: 800; color: #4a3b31; text-transform: uppercase; font-size: 0.85rem; width: 100%; line-height: 1.4; padding-top: 8px; margin: 0; }
        .wanted-button { background-color: var(--poster-red); color: white; font-family: 'Rye', cursive; padding: 1rem; width: 100%; margin-top: 1rem; border-bottom: 4px solid #500000; border-radius: 4px; cursor: pointer; border: none; }
        
        .message-toast {
            position: fixed; top: 15%; left: 50%; transform: translateX(-50%);
            background: var(--paper); color: #000; padding: 12px 24px; border: 3px solid var(--gold);
            font-weight: 900; z-index: 3000; visibility: hidden; opacity: 0; transition: opacity 0.2s; text-align: center;
            border-radius: 4px;
        }
        .message-toast.show { visibility: visible; opacity: 1; }

        .shake { animation: shake 0.4s linear; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

    <div class="valley-bg">
        <svg preserveAspectRatio="none" viewBox="0 0 1000 600">
            <path d="M0,600 L0,500 L50,480 L80,420 L120,420 L150,480 L200,500 L250,520 L300,450 L350,450 L400,520 L450,540 L500,480 L550,480 L600,540 L700,550 L750,500 L800,500 L850,550 L1000,560 L1000,600 Z" fill="#8c3521" />
            <path d="M0,600 L0,550 L100,530 L150,450 L220,450 L280,530 L400,560 L500,500 L600,500 L700,560 L850,580 L1000,570 L1000,600 Z" fill="#5d2417" />
            <path d="M0,600 L0,580 L200,570 L500,585 L800,575 L1000,580 L1000,600 Z" fill="#1a1613" />
        </svg>
    </div>

    <div class="content-overlay"></div>

    <header>
        <div class="header-landscape">
            <svg viewBox="0 0 400 100" preserveAspectRatio="xMidYMax slice" class="w-full h-full">
                <path d="M0,100 Q100,60 200,90 T400,80 L400,100 L0,100 Z" fill="#4d3423" />
                <g fill="var(--cactus)">
                    <rect x="40" y="40" width="8" height="40" rx="4"/><path d="M35,55 Q35,65 40,65 L40,60 Q38,60 38,55 Z" /><path d="M53,45 Q53,55 48,55 L48,50 Q50,50 50,45 Z" />
                    <rect x="340" y="30" width="10" height="55" rx="5"/><path d="M330,50 Q330,65 340,65 L340,58 Q335,58 335,50 Z" /><path d="M360,40 Q360,55 350,55 L350,48 Q355,48 355,40 Z" />
                </g>
            </svg>
        </div>
        <div class="header-content">
            <h1>SIX-SHOOTERS</h1>
            <p class="text-[10px] text-[#d4af37] font-black tracking-[0.3em] uppercase">6 SHOTS AT A BOUNTY</p>
        </div>
    </header>

    <div id="main-container">
        <div class="session-info">
            <div id="outlaw-count">OUTLAW: 1/5</div>
            <div id="bounty-total">TOTAL: $0</div>
        </div>
        <div id="grid"></div>
    </div>

    <div id="keyboard-area">
        <div id="keyboard-container">
            <div class="flex"><div class="key" data-key="Q">Q</div><div class="key" data-key="W">W</div><div class="key" data-key="E">E</div><div class="key" data-key="R">R</div><div class="key" data-key="T">T</div><div class="key" data-key="Y">Y</div><div class="key" data-key="U">U</div><div class="key" data-key="I">I</div><div class="key" data-key="O">O</div><div class="key" data-key="P">P</div></div>
            <div class="flex"><div class="flex-[0.5]"></div><div class="key" data-key="A">A</div><div class="key" data-key="S">S</div><div class="key" data-key="D">D</div><div class="key" data-key="F">F</div><div class="key" data-key="G">G</div><div class="key" data-key="H">H</div><div class="key" data-key="J">J</div><div class="key" data-key="K">K</div><div class="key" data-key="L">L</div><div class="flex-[0.5]"></div></div>
            <div class="flex"><div class="key wide" data-key="ENTER">DRAW</div><div class="key" data-key="Z">Z</div><div class="key" data-key="X">X</div><div class="key" data-key="C">C</div><div class="key" data-key="V">V</div><div class="key" data-key="B">B</div><div class="key" data-key="N">N</div><div class="key" data-key="M">M</div><div class="key wide" data-key="BACKSPACE">⌫</div></div>
        </div>
        <button id="give-up" class="surrender-btn">no bounty this time</button>
    </div>

    <div id="toast" class="message-toast"></div>

    <div id="modal-overlay">
        <div class="wanted-poster">
            <div class="wanted-header">WANTED</div>
            <div class="wanted-divider"></div>
            <div style="font-size: 1rem; color: var(--poster-red); font-family: 'Rye';">DEAD OR ALIVE</div>
            
            <div class="outlaw-content">
                <div id="target-display" class="wanted-display"></div>
                <div id="bounty-display" class="bounty-claimed"></div>
            </div>
            
            <p id="modal-sub" class="wanted-sub"></p>
            
            <button id="play-again" class="wanted-button">RELOAD & RIDE</button>
            
            <div id="session-total-display" class="bounty-total-final" style="display: none;"></div>
        </div>
    </div>

<script>
    const BOUNTY_SCALE = { 1: 50000, 2: 25000, 3: 10000, 4: 5000, 5: 2500, 6: 1000 };
    const TOTAL_SESSION_WORDS = 5;
    
    let targetWords = [];
    let validGuesses = [];
    let sessionTotalBounty = 0;
    let currentOutlawIndex = 0; 
    let targetWord = "";
    let currentRow = 0;
    let currentTile = 0;
    let guesses = ["", "", "", "", "", ""];
    let gameOver = false;

    // DOM Elements
    const gridElement = document.getElementById('grid');
    const keyboardKeys = document.querySelectorAll('.key');
    const toastElement = document.getElementById('toast');
    const modalOverlay = document.getElementById('modal-overlay');
    const targetDisplay = document.getElementById('target-display');
    const bountyDisplay = document.getElementById('bounty-display');
    const sessionTotalDisplay = document.getElementById('session-total-display');
    const modalSub = document.getElementById('modal-sub');
    const playAgainBtn = document.getElementById('play-again');
    const giveUpBtn = document.getElementById('give-up');
    const outlawCountEl = document.getElementById('outlaw-count');
    const bountyTotalEl = document.getElementById('bounty-total');

    // 1. FETCH THE COMPLETE DICTIONARIES ON LOAD
    async function loadDictionaries() {
        try {
            // These are community-maintained JSON versions of the original Wordle lists
            const response = await fetch('https://raw.githubusercontent.com/tabatkins/wordle-list/main/words.json');
            const data = await response.json();
            
            // In this specific JSON: data is the full list. 
            // We'll use a subset for targets to keep the game "fair" (common words)
            validGuesses = data.map(w => w.toUpperCase());
            
            // We filter for "common-ish" words to be targets so the game isn't impossible
            // (Most Wordle clones use the first 2300 words of the sorted list as answers)
            targetWords = validGuesses.slice(0, 2315); 
            
            startNewSession();
        } catch (e) {
            console.error("Failed to load the Wordle dictionary:", e);
            showToast("CONNECTION ERROR: NO AMMO");
        }
    }

    function startNewSession() {
        sessionTotalBounty = 0;
        currentOutlawIndex = 0;
        updateSessionUI();
        initOutlaw();
    }

    function updateSessionUI() {
        outlawCountEl.textContent = `OUTLAW: ${currentOutlawIndex + 1}/${TOTAL_SESSION_WORDS}`;
        bountyTotalEl.textContent = `TOTAL: $${sessionTotalBounty.toLocaleString()}`;
    }

    function initOutlaw() {
        if (targetWords.length === 0) return;
        targetWord = targetWords[Math.floor(Math.random() * targetWords.length)];
        
        currentRow = 0;
        currentTile = 0;
        guesses = ["", "", "", "", "", ""];
        gameOver = false;
        gridElement.innerHTML = '';
        for (let i = 0; i < 30; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.id = `tile-${i}`;
            gridElement.appendChild(tile);
        }
        keyboardKeys.forEach(key => {
            key.classList.remove('absent-key', 'present-key', 'correct-key');
        });
        modalOverlay.style.display = 'none';
        sessionTotalDisplay.style.display = 'none';
    }

    // ... (Keep your showToast, handleInput, updateGrid, shakeRow functions exactly as they were) ...

    async function submitGuess() {
        const guess = guesses[currentRow].toUpperCase();
        
        if (!validGuesses.includes(guess.toLowerCase()) && !validGuesses.includes(guess)) { 
            showToast("NOT IN THESE PARTS"); 
            shakeRow(); 
            return; 
        }

        gameOver = true; 
        const result = checkGuess(guess, targetWord.toUpperCase());
        for (let i = 0; i < 5; i++) {
            const tile = document.getElementById(`tile-${currentRow * 5 + i}`);
            tile.classList.add('flip');
            setTimeout(() => {
                tile.classList.add(result[i]);
                updateKeyboard(guess[i], result[i]);
            }, 300);
            await new Promise(r => setTimeout(r, 150));
        }

        if (guess === targetWord.toUpperCase()) endGame('win');
        else if (currentRow === 5) endGame('lose');
        else { currentRow++; currentTile = 0; gameOver = false; }
    }

    // ... (Keep checkGuess, updateKeyboard, endGame, and Event Listeners) ...

    // START THE GAME BY LOADING DATA
    window.onload = loadDictionaries;
</script>
</body>
</html>
