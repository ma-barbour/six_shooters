<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2b1d14">
    
    <title>Six-Shooters - 5-Letter Showdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rye&family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --dust: #1a1613;
            --gold: #d4af37;
            --paper: #e3d5b8;
            --correct: #538d4e;
            --present: #b59f3b;
            --absent: #3a3a3c;
            --sky-top: #ff9d6c;
            --sky-bottom: #bb4e31;
            --cactus: #2d4c1e;
            --poster-red: #b22222;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dust);
            color: var(--paper);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
            position: relative;
            margin: 0;
            padding-top: env(safe-area-inset-top);
        }

        .valley-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
        }

        .valley-bg svg {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
        }

        .content-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 0;
        }

        header {
            position: relative;
            z-index: 20;
            background: #2b1d14;
            overflow: hidden;
            border-bottom: 4px solid var(--gold);
            padding: 0.8rem 0;
            flex-shrink: 0;
            text-align: center;
        }

        .header-landscape {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0.5;
        }

        .header-content { position: relative; z-index: 10; }

        h1 {
            font-family: 'Rye', cursive;
            color: var(--gold);
            text-shadow: 3px 3px 0px #000;
            font-size: 1.8rem;
            margin: 0;
        }

        #main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
            z-index: 10;
            padding: 5px 0;
        }

        .session-info {
            display: flex;
            justify-content: space-between;
            width: 90vw;
            max-width: 330px;
            margin-bottom: 8px;
            font-family: 'Rye', cursive;
            color: var(--gold);
            font-size: 0.85rem;
            text-shadow: 1px 1px 2px #000;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 8px;
            width: 90vw;
            max-width: 330px; 
            margin: 0 auto;
        }

        .tile {
            aspect-ratio: 1 / 1;
            border: 2px solid #5d4a3e;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            user-select: none;
            backdrop-filter: blur(4px);
            line-height: 1;
        }

        .tile.populated { border-color: var(--gold); animation: pop 0.1s linear 1; }
        @keyframes pop { 50% { transform: scale(1.1); } }

        .tile.flip { animation: flip 0.6s ease forwards; }
        @keyframes flip {
            0% { transform: rotateX(0); }
            45% { transform: rotateX(90deg); }
            55% { transform: rotateX(90deg); }
            100% { transform: rotateX(0); }
        }

        .present { background-color: var(--present) !important; border-color: var(--present) !important; color: white; }
        .correct { background-color: var(--correct) !important; border-color: var(--correct) !important; color: white; }
        .absent { background-color: var(--absent) !important; border-color: var(--absent) !important; color: #888; }

        #keyboard-area {
            flex-shrink: 0;
            width: 100%;
            position: relative;
            z-index: 10;
            padding-bottom: calc(3.5rem + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #keyboard-container { width: 100%; max-width: 500px; padding: 4px; }

        .key {
            background-color: #3d2b1f;
            color: var(--paper);
            border-radius: 4px;
            cursor: pointer;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            height: 54px;
            margin: 2px;
            transition: all 0.1s;
            border-bottom: 3px solid #1a1613;
            text-transform: uppercase;
            font-size: 1.3rem;
        }

        .key:active { transform: translateY(2px); border-bottom-width: 1px; }
        .key.absent-key { visibility: hidden; pointer-events: none; opacity: 0; }
        .key.present-key { background-color: var(--present); color: white; }
        .key.correct-key { background-color: var(--correct); color: white; }
        .key.wide { flex: 1.8; font-size: 0.75rem; font-family: 'Rye', cursive; }

        .surrender-btn {
            margin-top: 15px;
            background: none;
            border: 1px solid #5d4a3e;
            color: #d4af37;
            font-family: 'Rye', cursive;
            font-size: 0.75rem;
            padding: 8px 20px;
            border-radius: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            opacity: 0.8;
        }

        #modal-overlay {
            position: fixed; inset: 0;
            background-color: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center;
            z-index: 2000; backdrop-filter: blur(6px);
        }

        .wanted-poster {
            background-color: #f4f1ea; border: 2px solid #d3cbb8;
            padding: 1.25rem; max-width: 320px; width: 88%;
            display: flex; flex-direction: column; align-items: center;
            text-align: center; border-radius: 2px; position: relative;
        }

        .wanted-header { font-family: 'Rye', cursive; color: var(--poster-red); font-size: 2.8rem; margin: 0; width: 100%; }
        .wanted-divider { height: 2px; background-color: var(--poster-red); width: 100%; margin: 0.15rem 0 0.4rem; }
        
        .outlaw-content {
            display: flex; flex-direction: column; align-items: center; width: 100%;
            border-top: 1px dashed var(--poster-red); border-bottom: 1px dashed var(--poster-red);
            padding: 0.75rem 0; margin: 0.5rem 0;
        }

        .wanted-display { font-family: 'Rye', cursive; font-size: 2.4rem; color: #1a1613; letter-spacing: 2px; text-align: center; width: 100%; text-transform: uppercase; }
        .bounty-claimed { font-family: 'Rye', cursive; font-size: 1.5rem; color: var(--correct); margin-top: 2px; }
        
        .bounty-total-final { 
            font-family: 'Rye', cursive; 
            font-size: 1.1rem; 
            color: #1a1613; 
            margin-top: 12px; 
            border-top: 1px solid rgba(0,0,0,0.15); 
            width: 90%; 
            padding-top: 10px; 
            letter-spacing: 0.5px;
        }

        .wanted-sub { font-weight: 800; color: #4a3b31; text-transform: uppercase; font-size: 0.85rem; width: 100%; line-height: 1.4; padding-top: 8px; margin: 0; }
        .wanted-button { background-color: var(--poster-red); color: white; font-family: 'Rye', cursive; padding: 1rem; width: 100%; margin-top: 1rem; border-bottom: 4px solid #500000; border-radius: 4px; cursor: pointer; border: none; }
        
        .message-toast {
            position: fixed; top: 15%; left: 50%; transform: translateX(-50%);
            background: var(--paper); color: #000; padding: 12px 24px; border: 3px solid var(--gold);
            font-weight: 900; z-index: 3000; visibility: hidden; opacity: 0; transition: opacity 0.2s; text-align: center;
            border-radius: 4px;
        }
        .message-toast.show { visibility: visible; opacity: 1; }

        .shake { animation: shake 0.4s linear; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
    </style>
</head>

    <div class="valley-bg">

            <path d="M0,600 L0,550 L100,530 L150,450 L220,450 L280,530 L400,560 L500,500 L600,500 L700,560 L850,580 L1000,570 L1000,600 Z" fill="#5d2417" />
            <path d="M0,600 L0,580 L200,570 L500,585 L800,575 L1000,580 L1000,600 Z" fill="#1a1613" />

    <div class="content-overlay"></div>

    <div id="main-container">

    <div id="keyboard-area">
        <div id="keyboard-container">
            <div class="flex"><div class="key" data-key="Q">Q</div><div class="key" data-key="W">W</div><div class="key" data-key="E">E</div><div class="key" data-key="R">R</div><div class="key" data-key="T">T</div><div class="key" data-key="Y">Y</div><div class="key" data-key="U">U</div><div class="key" data-key="I">I</div><div class="key" data-key="O">O</div><div class="key" data-key="P">P</div></div>
            <div class="flex"><div class="flex-[0.5]"></div><div class="key" data-key="A">A</div><div class="key" data-key="S">S</div><div class="key" data-key="D">D</div><div class="key" data-key="F">F</div><div class="key" data-key="G">G</div><div class="key" data-key="H">H</div><div class="key" data-key="J">J</div><div class="key" data-key="K">K</div><div class="key" data-key="L">L</div><div class="flex-[0.5]"></div></div>
            <div class="flex"><div class="key wide" data-key="ENTER">DRAW</div><div class="key" data-key="Z">Z</div><div class="key" data-key="X">X</div><div class="key" data-key="C">C</div><div class="key" data-key="V">V</div><div class="key" data-key="B">B</div><div class="key" data-key="N">N</div><div class="key" data-key="M">M</div><div class="key wide" data-key="BACKSPACE">⌫</div></div>
        </div>
        <button id="give-up" class="surrender-btn">no bounty this time</button>
    </div>

    <div id="toast" class="message-toast"></div>

    <div id="modal-overlay">
        <div class="wanted-poster">
            <div class="wanted-header">WANTED</div>
            <div class="wanted-divider"></div>
            <div style="font-size: 1rem; color: var(--poster-red); font-family: 'Rye';">DEAD OR ALIVE</div>
            
            <div class="outlaw-content">
                <div id="target-display" class="wanted-display"></div>
                <div id="bounty-display" class="bounty-claimed"></div>
            </div>
            
            <p id="modal-sub" class="wanted-sub"></p>
            
            <button id="play-again" class="wanted-button">RELOAD & RIDE</button>
            
            <div id="session-total-display" class="bounty-total-final" style="display: none;"></div>
        </div>
    </div>

OUT,TROVE,TRUCE,TRULY,TRUMP,TRUNK,TULIP,TUMOR,TUNIC,TURBO,TUTOR,TWANG,TWEAK,TWEED,TWEET,TWIGY,TWINE,TWINS,TWIRL,TWIST,ULTRA,UNCLE,UNIFY,UNITE,UNITY,URINE,USHER,USING,UTTER,VAGUE,VALET,VALOR,VALUE,VALVE,VAPID,VAPOR,VAULT,VEGAN,VENOM,VENUE,VERGE,VERSE,VIGOR,VILLA,VINYL,VIOLA,VIRAL,VISTA,VITAL,VIVID,VOCAL,VODKA,VOGUE,VOICE,VOMIT,VOTER,VOUCH,VOWEL,VYING,WACKY,WAFER,WAGER,WAGON,WAIST,WAIVE,WALTZ,WAVER,WEARY,WEAVE,WEDGE,WEEDY,WEIGH,WEIGH,WEIRD,WHARF,WHICH,WIDEN,WIDER,WIDOW,WIDTH,WIELD,WINDY,WISER,WITCH,WITTY,WOKEN,WOODY,WORDY,WOUND,WRATH,WRECK,WRIST,WROTE,YEARN,YEAST,YIELD,YOUNG,ZESTY,ZONAL";

        // Logic to process dictionary and filter only valid 5-letter words
        const ALL_WORDS = Array.from(new Set(dictionaryData.split(',').map(w => w.trim().toUpperCase())))
                            .filter(w => w.length === 5);
        
        const BOUNTY_SCALE = { 1: 50000, 2: 25000, 3: 10000, 4: 5000, 5: 2500, 6: 1000 };
        const TOTAL_SESSION_WORDS = 5;
        
        let sessionTotalBounty = 0;
        let currentOutlawIndex = 0; 
        let targetWord = "";
        let currentRow = 0;
        let currentTile = 0;
        let guesses = ["", "", "", "", "", ""];
        let gameOver = false;

        const gridElement = document.getElementById('grid');
        const keyboardKeys = document.querySelectorAll('.key');
        const toastElement = document.getElementById('toast');
        const modalOverlay = document.getElementById('modal-overlay');
        const targetDisplay = document.getElementById('target-display');
        const bountyDisplay = document.getElementById('bounty-display');
        const sessionTotalDisplay = document.getElementById('session-total-display');
        const modalSub = document.getElementById('modal-sub');
        const playAgainBtn = document.getElementById('play-again');
        const giveUpBtn = document.getElementById('give-up');
        const outlawCountEl = document.getElementById('outlaw-count');
        const bountyTotalEl = document.getElementById('bounty-total');

        function startNewSession() {
            sessionTotalBounty = 0;
            currentOutlawIndex = 0;
            updateSessionUI();
            initOutlaw();
        }

        function updateSessionUI() {
            outlawCountEl.textContent = `OUTLAW: ${currentOutlawIndex + 1}/${TOTAL_SESSION_WORDS}`;
            bountyTotalEl.textContent = `TOTAL: $${sessionTotalBounty.toLocaleString()}`;
        }

        function initOutlaw() {
            targetWord = ALL_WORDS[Math.floor(Math.random() * ALL_WORDS.length)];
            currentRow = 0;
            currentTile = 0;
            guesses = ["", "", "", "", "", ""];
            gameOver = false;
            gridElement.innerHTML = '';
            for (let i = 0; i < 30; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${i}`;
                gridElement.appendChild(tile);
            }
            keyboardKeys.forEach(key => {
                key.classList.remove('absent-key', 'present-key', 'correct-key');
            });
            modalOverlay.style.display = 'none';
            sessionTotalDisplay.style.display = 'none';
        }

        function showToast(msg, duration = 2000) {
            toastElement.textContent = msg;
            toastElement.classList.add('show');
            setTimeout(() => toastElement.classList.remove('show'), duration);
        }

        function handleInput(key) {
            if (gameOver) return;
            if (key === 'BACKSPACE' || key === 'DELETE') {
                if (currentTile > 0) {
                    currentTile--;
                    guesses[currentRow] = guesses[currentRow].slice(0, -1);
                    updateGrid();
                }
            } else if (key === 'ENTER') {
                if (guesses[currentRow].length === 5) submitGuess();
                else { showToast("NOT ENOUGH SHOTS"); shakeRow(); }
            } else if (/^[A-Z]$/.test(key)) {
                if (currentTile < 5) {
                    guesses[currentRow] += key;
                    currentTile++;
                    updateGrid();
                }
            }
        }

        function updateGrid() {
            const startIndex = currentRow * 5;
            const currentGuess = guesses[currentRow];
            for (let i = 0; i < 5; i++) {
                const tile = document.getElementById(`tile-${startIndex + i}`);
                const char = currentGuess[i] || "";
                if (char !== tile.textContent) {
                    tile.textContent = char;
                    if (char) tile.classList.add('populated');
                    else tile.classList.remove('populated');
                }
            }
        }

        function shakeRow() {
            const startIndex = currentRow * 5;
            for (let i = 0; i < 5; i++) document.getElementById(`tile-${startIndex + i}`).classList.add('shake');
            setTimeout(() => {
                for (let i = 0; i < 5; i++) document.getElementById(`tile-${startIndex + i}`).classList.remove('shake');
            }, 500);
        }

        async function submitGuess() {
            const guess = guesses[currentRow];
            if (!ALL_WORDS.includes(guess)) { showToast("NOT IN THESE PARTS"); shakeRow(); return; }
            gameOver = true; 
            const result = checkGuess(guess, targetWord);
            for (let i = 0; i < 5; i++) {
                const tile = document.getElementById(`tile-${currentRow * 5 + i}`);
                tile.classList.add('flip');
                setTimeout(() => {
                    tile.classList.add(result[i]);
                    updateKeyboard(guess[i], result[i]);
                }, 300);
                await new Promise(r => setTimeout(r, 150));
            }
            if (guess === targetWord) endGame('win');
            else if (currentRow === 5) endGame('lose');
            else { currentRow++; currentTile = 0; gameOver = false; }
        }

        function checkGuess(guess, target) {
            const result = new Array(5).fill('absent');
            const targetArr = target.split('');
            const guessArr = guess.split('');
            for (let i = 0; i < 5; i++) {
                if (guessArr[i] === targetArr[i]) { result[i] = 'correct'; targetArr[i] = null; guessArr[i] = null; }
            }
            for (let i = 0; i < 5; i++) {
                if (guessArr[i]) {
                    const idx = targetArr.indexOf(guessArr[i]);
                    if (idx !== -1) { result[i] = 'present'; targetArr[idx] = null; }
                }
            }
            return result;
        }

        function updateKeyboard(letter, status) {
            const keyBtn = document.querySelector(`.key[data-key="${letter}"]`);
            if (!keyBtn) return;
            if (status === 'correct') {
                keyBtn.classList.remove('present-key', 'absent-key');
                keyBtn.classList.add('correct-key');
            } else if (status === 'present' && !keyBtn.classList.contains('correct-key')) {
                keyBtn.classList.remove('absent-key');
                keyBtn.classList.add('present-key');
            } else if (status === 'absent' && !keyBtn.classList.contains('correct-key') && !keyBtn.classList.contains('present-key')) {
                keyBtn.classList.add('absent-key');
            }
        }

        function endGame(status) {
            gameOver = true;
            let currentBounty = (status === 'win') ? BOUNTY_SCALE[currentRow + 1] : 0;
            sessionTotalBounty += currentBounty;
            updateSessionUI();

            const isFinalOutlaw = currentOutlawIndex === TOTAL_SESSION_WORDS - 1;

            setTimeout(() => {
                modalOverlay.style.display = 'flex';
                targetDisplay.textContent = targetWord;
                
                if (status === 'win') {
                    bountyDisplay.textContent = `BOUNTY: $${currentBounty.toLocaleString()}`;
                    modalSub.textContent = `You bagged 'em in ${currentRow + 1} shot${currentRow === 0 ? '' : 's'}. Collect your reward.`;
                } else if (status === 'surrender') {
                    bountyDisplay.textContent = `BOUNTY: $0`;
                    modalSub.textContent = "Looks like you're shooting blanks today.";
                } else {
                    bountyDisplay.textContent = `BOUNTY: $0`;
                    modalSub.textContent = "The outlaw got away. Better luck next time, Sheriff.";
                }

                if (isFinalOutlaw) {
                    sessionTotalDisplay.style.display = 'block';
                    sessionTotalDisplay.textContent = `CAREER TOTAL: $${sessionTotalBounty.toLocaleString()}`;
                    playAgainBtn.textContent = "COLLECT & RETIRE";
                } else {
                    sessionTotalDisplay.style.display = 'none';
                    playAgainBtn.textContent = "NEXT BOUNTY";
                }
            }, status === 'surrender' ? 100 : 1000);
        }

        window.addEventListener('keydown', (e) => {
            let key = e.key.toUpperCase();
            handleInput(key);
        });

        keyboardKeys.forEach(k => k.addEventListener('click', () => handleInput(k.getAttribute('data-key'))));
        giveUpBtn.addEventListener('click', () => { if (!gameOver) endGame('surrender'); });
        playAgainBtn.addEventListener('click', () => {
            if (currentOutlawIndex < TOTAL_SESSION_WORDS - 1) { currentOutlawIndex++; updateSessionUI(); initOutlaw(); }
            else startNewSession();
        });

        window.onload = startNewSession;
    </script>
