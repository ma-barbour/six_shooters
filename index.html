<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Six-Shooters - Full Dictionary Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rye&family=Inter:wght@400;700;900&display=swap');
        :root { --dust: #1a1613; --gold: #d4af37; --paper: #e3d5b8; --correct: #538d4e; --present: #b59f3b; --absent: #3a3a3c; --sky-top: #ff9d6c; --sky-bottom: #bb4e31; --cactus: #2d4c1e; --poster-red: #b22222; }
        body { font-family: 'Inter', sans-serif; background-color: var(--dust); color: var(--paper); height: 100vh; display: flex; flex-direction: column; overflow: hidden; margin: 0; padding-top: env(safe-area-inset-top); }
        .valley-bg { position: fixed; inset: 0; z-index: -1; background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom)); }
        .valley-bg svg { position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; }
        .content-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.45); z-index: 0; }
        header { position: relative; z-index: 20; background: #2b1d14; border-bottom: 4px solid var(--gold); padding: 0.8rem 0; flex-shrink: 0; text-align: center; }
        h1 { font-family: 'Rye', cursive; color: var(--gold); text-shadow: 3px 3px 0px #000; font-size: 1.8rem; margin: 0; }
        #main-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; position: relative; z-index: 10; min-height: 350px; }
        .session-info { display: flex; justify-content: space-between; width: 90vw; max-width: 330px; margin-bottom: 8px; font-family: 'Rye', cursive; color: var(--gold); font-size: 0.85rem; }
        #grid { display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(6, 1fr); gap: 8px; width: 90vw; max-width: 330px; }
        .tile { aspect-ratio: 1 / 1; border: 2px solid #5d4a3e; background: rgba(0, 0, 0, 0.75); display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 900; text-transform: uppercase; line-height: 1; user-select: none; }
        .tile.populated { border-color: var(--gold); animation: pop 0.1s linear 1; }
        @keyframes pop { 50% { transform: scale(1.1); } }
        .tile.flip { animation: flip 0.6s ease forwards; }
        @keyframes flip { 0% { transform: rotateX(0); } 45% { transform: rotateX(90deg); } 55% { transform: rotateX(90deg); } 100% { transform: rotateX(0); } }
        .present { background-color: var(--present) !important; border-color: var(--present) !important; color: white; }
        .correct { background-color: var(--correct) !important; border-color: var(--correct) !important; color: white; }
        .absent { background-color: var(--absent) !important; border-color: var(--absent) !important; color: #888; }
        #keyboard-area { flex-shrink: 0; width: 100%; z-index: 10; padding-bottom: calc(3.5rem + env(safe-area-inset-bottom)); display: flex; flex-direction: column; align-items: center; }
        #keyboard-container { width: 100%; max-width: 500px; padding: 4px; }
        .key { background-color: #3d2b1f; color: var(--paper); border-radius: 4px; cursor: pointer; flex: 1; display: flex; align-items: center; justify-content: center; font-weight: 800; height: 54px; margin: 2px; border-bottom: 3px solid #1a1613; font-size: 1.3rem; transition: transform 0.05s; }
        .key:active { transform: scale(0.95); }
        .key.absent-key { opacity: 0.4; }
        .key.present-key { background-color: var(--present); color: white; }
        .key.correct-key { background-color: var(--correct); color: white; }
        .key.wide { flex: 1.8; font-size: 0.75rem; font-family: 'Rye', cursive; }
        .surrender-btn { margin-top: 15px; background: none; border: 1px solid #5d4a3e; color: #d4af37; font-family: 'Rye', cursive; font-size: 0.75rem; padding: 8px 20px; border-radius: 20px; cursor: pointer; }
        #modal-overlay { position: fixed; inset: 0; background-color: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(6px); }
        .wanted-poster { background-color: #f4f1ea; border: 2px solid #d3cbb8; padding: 1.25rem; max-width: 320px; width: 88%; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .wanted-header { font-family: 'Rye', cursive; color: var(--poster-red); font-size: 2.8rem; margin: 0; }
        .wanted-display { font-family: 'Rye', cursive; font-size: 2.4rem; color: #1a1613; letter-spacing: 2px; text-transform: uppercase; margin: 10px 0; border-top: 1px dashed red; border-bottom: 1px dashed red; width: 100%; }
        .wanted-button { background-color: var(--poster-red); color: white; font-family: 'Rye', cursive; padding: 1rem; width: 100%; margin-top: 1rem; border: none; cursor: pointer; }
        .message-toast { position: fixed; top: 15%; left: 50%; transform: translateX(-50%); background: var(--paper); color: #000; padding: 12px 24px; border: 3px solid var(--gold); font-weight: 900; z-index: 3000; visibility: hidden; opacity: 0; border-radius: 4px; }
        .message-toast.show { visibility: visible; opacity: 1; }
        .shake { animation: shake 0.4s linear; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }
    </style>
</head>
<body>
    <div class="valley-bg"><svg preserveAspectRatio="none" viewBox="0 0 1000 600"><path d="M0,600 L0,500 L50,480 L80,420 L120,420 L150,480 L200,500 L250,520 L300,450 L350,450 L400,520 L450,540 L500,480 L550,480 L600,540 L700,550 L750,500 L800,500 L850,550 L1000,560 L1000,600 Z" fill="#8c3521" /><path d="M0,600 L0,550 L100,530 L150,450 L220,450 L280,530 L400,560 L500,500 L600,500 L700,560 L850,580 L1000,570 L1000,600 Z" fill="#5d2417" /><path d="M0,600 L0,580 L200,570 L500,585 L800,575 L1000,580 L1000,600 Z" fill="#1a1613" /></svg></div>
    <div class="content-overlay"></div>
    <header><h1>SIX-SHOOTERS</h1><p class="text-[10px] text-[#d4af37] font-black tracking-[0.3em] uppercase">6 SHOTS AT A BOUNTY</p></header>
    <div id="main-container">
        <div id="loading-msg" class="font-bold text-gold">LOADING AMMO...</div>
        <div id="game-ui" style="display:none; flex-direction:column; align-items:center;">
            <div class="session-info"><div id="outlaw-count">OUTLAW: 1/5</div><div id="bounty-total">TOTAL: $0</div></div>
            <div id="grid"></div>
        </div>
    </div>
    <div id="keyboard-area">
        <div id="keyboard-container">
            <div class="flex"><div class="key" data-key="Q">Q</div><div class="key" data-key="W">W</div><div class="key" data-key="E">E</div><div class="key" data-key="R">R</div><div class="key" data-key="T">T</div><div class="key" data-key="Y">Y</div><div class="key" data-key="U">U</div><div class="key" data-key="I">I</div><div class="key" data-key="O">O</div><div class="key" data-key="P">P</div></div>
            <div class="flex"><div class="flex-[0.5]"></div><div class="key" data-key="A">A</div><div class="key" data-key="S">S</div><div class="key" data-key="D">D</div><div class="key" data-key="F">F</div><div class="key" data-key="G">G</div><div class="key" data-key="H">H</div><div class="key" data-key="J">J</div><div class="key" data-key="K">K</div><div class="key" data-key="L">L</div><div class="flex-[0.5]"></div></div>
            <div class="flex"><div class="key wide" data-key="ENTER">DRAW</div><div class="key" data-key="Z">Z</div><div class="key" data-key="X">X</div><div class="key" data-key="C">C</div><div class="key" data-key="V">V</div><div class="key" data-key="B">B</div><div class="key" data-key="N">N</div><div class="key" data-key="M">M</div><div class="key wide" data-key="BACKSPACE">⌫</div></div>
        </div>
        <button id="give-up" class="surrender-btn">no bounty this time</button>
    </div>
    <div id="toast" class="message-toast"></div>
    <div id="modal-overlay">
        <div class="wanted-poster">
            <div class="wanted-header">WANTED</div>
            <div id="target-display" class="wanted-display"></div>
            <div id="bounty-display" style="font-family:'Rye'; color:green; font-size:1.5rem;"></div>
            <p id="modal-sub" style="font-weight:bold; color:#4a3b31; margin:10px 0;"></p>
            <button id="play-again" class="wanted-button">RELOAD & RIDE</button>
            <div id="session-total-display" style="display:none; font-family:'Rye'; margin-top:10px; border-top:1px solid #ccc; padding-top:10px; width:100%;"></div>
        </div>
    </div>

    <script>
        const BOUNTY_SCALE = { 1: 50000, 2: 25000, 3: 10000, 4: 5000, 5: 2500, 6: 1000 };
        const TOTAL_SESSION_WORDS = 5;
        
        let validGuesses = new Set();
        let targetWords = [];
        let sessionTotalBounty = 0;
        let currentOutlawIndex = 0; 
        let targetWord = "";
        let currentRow = 0;
        let currentTile = 0;
        let guesses = ["", "", "", "", "", ""];
        let gameOver = false;

        async function initGame() {
            try {
                // Fetch the original 12k Wordle guess list
                const response = await fetch('https://raw.githubusercontent.com/tabatkins/wordle-list/main/words.json');
                const words = await response.json();
                
                // Clean and split the lists
                const allWords = words.map(w => w.toUpperCase());
                validGuesses = new Set(allWords);
                
                // Target list is the first 2,315 words (standard Wordle answers)
                targetWords = allWords.slice(0, 2315);
                
                // Switch UI
                document.getElementById('loading-msg').style.display = 'none';
                document.getElementById('game-ui').style.display = 'flex';
                
                startNewSession();
            } catch (err) {
                console.error(err);
                document.getElementById('loading-msg').textContent = "ERROR: OUT OF AMMO (Check Connection)";
            }
        }

        function startNewSession() {
            sessionTotalBounty = 0;
            currentOutlawIndex = 0;
            updateSessionUI();
            initOutlaw();
        }

        function initOutlaw() {
            targetWord = targetWords[Math.floor(Math.random() * targetWords.length)];
            currentRow = 0; currentTile = 0; guesses = ["", "", "", "", "", ""]; gameOver = false;
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let i = 0; i < 30; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${i}`;
                grid.appendChild(tile);
            }
            document.querySelectorAll('.key').forEach(key => key.classList.remove('absent-key', 'present-key', 'correct-key'));
            document.getElementById('modal-overlay').style.display = 'none';
        }

        function updateGrid() {
            const startIndex = currentRow * 5;
            for (let i = 0; i < 5; i++) {
                const tile = document.getElementById(`tile-${startIndex + i}`);
                tile.textContent = guesses[currentRow][i] || "";
                if (guesses[currentRow][i]) tile.classList.add('populated'); else tile.classList.remove('populated');
            }
        }

        async function submitGuess() {
            const guess = guesses[currentRow].toUpperCase();
            if (!validGuesses.has(guess)) { showToast("NOT IN THESE PARTS"); shakeRow(); return; }
            
            gameOver = true;
            const result = checkGuess(guess, targetWord);
            for (let i = 0; i < 5; i++) {
                const tile = document.getElementById(`tile-${currentRow * 5 + i}`);
                tile.classList.add('flip');
                setTimeout(() => {
                    tile.classList.add(result[i]);
                    updateKeyboard(guess[i], result[i]);
                }, 300);
                await new Promise(r => setTimeout(r, 100));
            }

            if (guess === targetWord) endGame('win');
            else if (currentRow === 5) endGame('lose');
            else { currentRow++; currentTile = 0; gameOver = false; }
        }

        function checkGuess(guess, target) {
            const res = Array(5).fill('absent');
            const tArr = target.split('');
            const gArr = guess.split('');
            for (let i = 0; i < 5; i++) if (gArr[i] === tArr[i]) { res[i] = 'correct'; tArr[i] = null; gArr[i] = null; }
            for (let i = 0; i < 5; i++) if (gArr[i]) {
                const idx = tArr.indexOf(gArr[i]);
                if (idx !== -1) { res[i] = 'present'; tArr[idx] = null; }
            }
            return res;
        }

        function updateKeyboard(letter, status) {
            const keyBtn = document.querySelector(`.key[data-key="${letter}"]`);
            if (!keyBtn) return;
            if (status === 'correct') { keyBtn.classList.remove('present-key', 'absent-key'); keyBtn.classList.add('correct-key'); }
            else if (status === 'present' && !keyBtn.classList.contains('correct-key')) { keyBtn.classList.remove('absent-key'); keyBtn.classList.add('present-key'); }
            else if (status === 'absent' && !keyBtn.classList.contains('correct-key') && !keyBtn.classList.contains('present-key')) keyBtn.classList.add('absent-key');
        }

        function endGame(status) {
            let bounty = (status === 'win') ? BOUNTY_SCALE[currentRow + 1] : 0;
            sessionTotalBounty += bounty;
            updateSessionUI();
            setTimeout(() => {
                document.getElementById('modal-overlay').style.display = 'flex';
                document.getElementById('target-display').textContent = targetWord;
                document.getElementById('bounty-display').textContent = `BOUNTY: $${bounty.toLocaleString()}`;
                document.getElementById('modal-sub').textContent = status === 'win' ? "Nice shootin', Tex." : "The Outlaw got away...";
                const isFinal = currentOutlawIndex === TOTAL_SESSION_WORDS - 1;
                document.getElementById('session-total-display').style.display = isFinal ? 'block' : 'none';
                document.getElementById('session-total-display').textContent = `TOTAL REWARD: $${sessionTotalBounty.toLocaleString()}`;
                document.getElementById('play-again').textContent = isFinal ? "COLLECT & RETIRE" : "NEXT OUTLAW";
            }, 1000);
        }

        function handleInput(key) {
            if (gameOver) return;
            if (key === 'BACKSPACE' || key === 'DELETE') { if (currentTile > 0) { currentTile--; guesses[currentRow] = guesses[currentRow].slice(0, -1); updateGrid(); } }
            else if (key === 'ENTER') { if (guesses[currentRow].length === 5) submitGuess(); else { showToast("NOT ENOUGH SHOTS"); shakeRow(); } }
            else if (/^[A-Z]$/.test(key)) { if (currentTile < 5) { guesses[currentRow] += key; currentTile++; updateGrid(); } }
        }

        function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        function shakeRow() { const start = currentRow * 5; for(let i=0; i<5; i++) document.getElementById(`tile-${start+i}`).classList.add('shake'); setTimeout(() => { for(let i=0; i<5; i++) document.getElementById(`tile-${start+i}`).classList.remove('shake'); }, 500); }
        function updateSessionUI() { document.getElementById('outlaw-count').textContent = `OUTLAW: ${currentOutlawIndex + 1}/${TOTAL_SESSION_WORDS}`; document.getElementById('bounty-total').textContent = `TOTAL: $${sessionTotalBounty.toLocaleString()}`; }

        window.addEventListener('keydown', e => handleInput(e.key.toUpperCase()));
        document.querySelectorAll('.key').forEach(k => k.addEventListener('click', () => handleInput(k.getAttribute('data-key'))));
        document.getElementById('give-up').addEventListener('click', () => { if (!gameOver) endGame('surrender'); });
        document.getElementById('play-again').addEventListener('click', () => { if (currentOutlawIndex < TOTAL_SESSION_WORDS - 1) { currentOutlawIndex++; updateSessionUI(); initOutlaw(); } else startNewSession(); });

        initGame();
    </script>
</body>
</html>
